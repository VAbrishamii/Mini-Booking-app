name: Continuous Integration (CI)

# Trigger the workflow on push or pull request events to the main branch
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # Checkout the repository to the GitHub Actions runner
    - name: Checkout repository
      uses: actions/checkout@v4

    # Set up Node.js environment with caching for npm dependencies
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm' # Enable caching for npm dependencies

    # Install project dependencies using npm ci for a clean install
    - name: Install dependencies
      run: npm ci

    # Run tests using ESLint to check for code quality and style issues
    - name: Run ESLint (Linting)
      run: npm run lint

    # Run TypeScript type checking to ensure there are no type errors
    - name: Run TypeScript Typecheck
      run: npx tsc --noEmit

    # Build the Next.js application to ensure it compiles successfully
    - name: Build Next.js application
      run: npm run build